<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲食紀錄</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #fafafa; }
.management-container { margin: 10px; border: 1px solid #ccc; border-radius: 12px; background: #fff; overflow: hidden; }
.management-header { padding: 12px; font-weight: bold; background: #efefef; cursor: pointer; }
.management-body { display: none; padding: 12px; border-top: 1px solid #ddd; }
.management-container.expanded .management-body { display: flex; flex-direction: column; gap: 10px; }
.management-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.management-note { color: #666; font-size: 12px; }
.auth-indicator { font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 999px; background: #f5d6d6; color: #a11; }
.auth-indicator.connected { background: #d8f2dc; color: #176d2b; }
.tabs { display: flex; margin: 10px; gap: 10px; }
.tab { flex: 1; padding: 10px; border-radius: 20px; text-align: center; border: 1px solid #ccc; cursor: pointer; background: #fff; }
.tab.active { background: #333; color: white; }
.container { padding: 20px; padding-bottom: 90px; }
.date-nav { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 14px; }
.date-label { min-width: 160px; text-align: center; font-weight: bold; }
.meal-card,.snack-card { border: 1px solid #ddd; border-radius: 14px; background: #fff; padding: 12px; margin-bottom: 12px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-title { font-weight: bold; }
.select-btn,.add-snack-btn,.type-plus,.modal-action,.qty-btn,.date-btn,.tool-btn { border: 1px solid #bbb; background: #fff; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
.tool-btn.warn { border-color: #b22; color: #b22; }
.add-snack-btn { width: 100%; font-size: 18px; }
.items-list { display: flex; flex-direction: column; gap: 8px; }
.consumable-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; background: #f4f4f4; border-radius: 10px; padding: 8px; }
.item-info { display: flex; flex-direction: column; gap: 2px; }
.item-sub { color: #666; font-size: 12px; }
.qty-control { display: flex; align-items: center; gap: 6px; }
.qty-input { width: 54px; text-align: center; padding: 4px; border-radius: 6px; border: 1px solid #bbb; }
.floating { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 2px solid #ccc; transition: height 0.3s; height: 54px; overflow: hidden; z-index: 5;}
.floating.expanded { height: 430px; }
.floating-header { text-align: center; padding: 12px; cursor: pointer; background: #eee; font-weight: bold; }
.total-grid { display: flex; padding: 10px; }
.column { flex: 1; padding: 10px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; z-index: 1000; }
.modal-overlay.open { display: block; }
.modal { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: min(760px, calc(100% - 20px)); max-height: calc(100% - 20px); background: #fff; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
.modal-banner { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; background: #f8f8f8; position: sticky; top: 0; }
.modal-title { font-weight: bold; }
.modal-actions-group { display: flex; gap: 8px; }
.modal-body { padding: 10px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
.sort-modal { width: min(520px, calc(100% - 20px)); }
.sort-section-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
.sort-options { display: flex; flex-wrap: wrap; gap: 8px; }
.sort-option-btn { border: 1px solid #bbb; background: #fff; border-radius: 999px; padding: 6px 12px; cursor: pointer; }
.sort-option-btn.active { background: #333; color: #fff; border-color: #333; }
.sort-divider { border: 0; border-top: 1px solid #ddd; margin: 12px 0; }
.type-card { border: 1px solid #ddd; border-radius: 10px; padding: 8px; background: #fcfcfc; }
.type-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.type-items { display: none; flex-wrap: wrap; gap: 6px; }
.type-items.open { display: flex; }
.option-chip { border: 1px solid #bbb; border-radius: 20px; padding: 5px 10px; background: #fff; cursor: pointer; }
.option-chip.selected { background: #333; color: #fff; border-color: #333; }
.editor-link-btn {
  position: fixed;
  right: 14px;
  bottom: 66px;
  z-index: 10;
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  background: #333;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
  transition: bottom 0.3s;
  text-decoration: none;
}

.editor-link-btn.up {
  bottom: 332px;
}

@media (max-width: 768px) {
  .tabs {
    margin: 8px;
    gap: 8px;
  }

  .container {
    padding: 12px;
    padding-bottom: 96px;
  }

  .date-nav {
    flex-wrap: wrap;
  }

  .date-label {
    width: 100%;
    min-width: 0;
    order: -1;
  }

  .consumable-row {
    flex-direction: column;
    align-items: stretch;
  }

  .qty-control {
    justify-content: flex-end;
  }

  .total-grid {
    flex-direction: column;
    gap: 4px;
  }

  .column {
    padding: 8px 10px;
  }

  .floating.expanded {
    height: min(78vh, 560px);
  }

  .editor-link-btn {
    right: 10px;
    bottom: 64px;
    padding: 9px 12px;
    font-size: 14px;
  }

  .editor-link-btn.up {
    bottom: min(76vh, 520px);
  }
}

@media (max-width: 480px) {
  .management-container,
  .tabs {
    margin: 8px;
  }

  .management-body,
  .management-header {
    padding: 10px;
  }

  .tool-btn,
  .date-btn,
  .tab,
  .select-btn,
  .add-snack-btn,
  .type-plus,
  .modal-action,
  .qty-btn {
    font-size: 14px;
  }

  .modal {
    width: calc(100% - 12px);
    max-height: calc(100% - 12px);
  }

  .modal-actions-group {
    gap: 6px;
  }

  .modal-body {
    grid-template-columns: 1fr;
  }

  .qty-input {
    width: 48px;
  }
}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="management" class="management-container">
  <div class="management-header" onclick="toggleManagement()">資料管理 ▼</div>
  <div class="management-body">
    <div class="management-row">
      <button id="googleLoginBtn" class="tool-btn" onclick="handleGoogleLogin()">Google 登入</button>
      <button id="googleLogoutBtn" class="tool-btn" onclick="logoutGoogle()" style="display:none">Google 登出</button>
      <label><input type="checkbox" id="staySignedIn" onchange="toggleStaySignedIn(this.checked)"> 保持登入偏好</label>
      <span id="googleIndicator" class="auth-indicator">未連線</span>
      <span id="googleStatus" class="management-note">尚未登入 Google</span>
    </div>
    <div class="management-row">
      <button class="tool-btn" onclick="backupToGoogleDrive()">備份到 Google Drive</button>
      <button class="tool-btn" onclick="restoreFromGoogleDrive()">從 Google Drive 還原</button>
    </div>
    <div class="management-row">
      <button class="tool-btn" onclick="exportJson()">匯出 JSON</button>
      <button class="tool-btn" onclick="document.getElementById('jsonImportInput').click()">匯入 JSON</button>
      <input id="jsonImportInput" type="file" accept="application/json" style="display:none" onchange="importJson(event)">
      <button class="tool-btn warn" onclick="wipeAllData()">清除全部資料</button>
    </div>
    <div id="lastBackupStatus" class="management-note">上次備份：尚無紀錄</div>
    <div class="management-note">Google 備份會寫入 Drive 的 appDataFolder（僅本 App 可見）。</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('daily', this)">每日</div>
  <div class="tab" onclick="switchTab('review', this)">回顧</div>
</div>

<div id="daily" class="container">
  <div class="date-nav">
    <button class="date-btn" onclick="shiftDate(-1)">◀ 前一天</button>
    <div id="dateLabel" class="date-label"></div>
    <button class="date-btn" onclick="shiftDate(1)">後一天 ▶</button>
  </div>
  <div id="mealContainer"></div>
</div>

<div id="review" class="container" style="display:none;">回顧頁籤即將推出。</div>

<div class="floating" id="floating">
  <div class="floating-header" onclick="toggleFloating()">每日總攝取量</div>
  <div class="total-grid">
    <div class="column">
      <h4>建議減少</h4>
      <div>飽和脂肪：<span id="satFat">0</span> g</div>
      <div>添加糖：<span id="sugar">0</span> g</div>
    </div>
    <div class="column">
      <h4>建議足量</h4>
      <div>熱量：<span id="calories">0/1200</span> kcal</div>
      <div>碳水化合物：<span id="carbohydrates">0/130</span> g</div>
      <div>蛋白質：<span id="proteinAdequate">0/60</span> g</div>
      <div>鈉：<span id="sodiumAdequate">0/1500</span> mg</div>
      <div>總脂肪：<span id="totalFat">0/44</span> g</div>
      <div>水溶性纖維：<span id="solFiberAdequate">0/6</span> g</div>
      <div>非水溶性纖維：<span id="insFiberAdequate">0/14</span> g</div>
      <div>鉀：<span id="potassiumAdequate">0/3500</span> mg</div>
      <div>鎂：<span id="magnesiumAdequate">0/350</span> mg</div>
    </div>
  </div>
</div>

<a class="editor-link-btn" id="editorLinkBtn" href="consumables-editor.html">編輯可食項目</a>

<div id="selectionModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-banner">
      <button class="modal-action" onclick="closeModal()">取消</button>
      <div class="modal-title">選擇可食項目</div>
      <div class="modal-actions-group">
        <button class="modal-action" onclick="openSortModal()">排序</button>
        <button class="modal-action" onclick="confirmSelection()">選取</button>
      </div>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<div id="sortModal" class="modal-overlay">
  <div class="modal sort-modal">
    <div class="modal-banner">
      <button class="modal-action" onclick="closeSortModal()">取消</button>
      <div class="modal-title">排序設定</div>
      <button class="modal-action" onclick="applySortPreference()">套用</button>
    </div>
    <div class="modal-body" style="display:block;">
      <div class="sort-section-title">排序欄位</div>
      <div id="sortFieldOptions" class="sort-options"></div>
      <hr class="sort-divider">
      <div class="sort-section-title">排序方向</div>
      <div id="sortDirectionOptions" class="sort-options"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'dietTrackerDailyDataV1';
const STAY_SIGNED_IN_KEY = 'dietTrackerStaySignedIn';
const GOOGLE_TOKEN_CACHE_KEY = 'dietTrackerGoogleTokenCache';
const LAST_BACKUP_AT_KEY = 'dietTrackerLastBackupAt';
const AUTO_BACKUP_INTERVAL_MS = 60 * 60 * 1000;
const GDRIVE_FILE_NAME = 'diet-tracker-backup.json';
const GOOGLE_CLIENT_ID = '332987792434-u7r3hdl46asbqo0si3ngqu46kdbgf2at.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const nutrients = ['calories','totalFat','carbohydrates','saturatedFat','addedSugar','sodium','protein','solubleFiber','insolubleFiber','potassium','magnesium'];
const sortFieldOptions = ['name', ...nutrients];
const sortFieldLabels = {
  name: '名稱',
  calories: '熱量',
  totalFat: '總脂肪',
  carbohydrates: '碳水化合物',
  saturatedFat: '飽和脂肪',
  addedSugar: '添加糖',
  sodium: '鈉',
  protein: '蛋白質',
  solubleFiber: '水溶性纖維',
  insolubleFiber: '非水溶性纖維',
  potassium: '鉀',
  magnesium: '鎂'
};
const suggestedMinimums = { calories: 1200, carbohydrates: 130, protein: 60, sodium: 1500, totalFat: 44, solubleFiber: 6, insolubleFiber: 14, potassium: 3500, magnesium: 350 };

let totals = { calories:0, totalFat:0, carbohydrates:0, saturatedFat:0, addedSugar:0, sodium:0, protein:0, solubleFiber:0, insolubleFiber:0, potassium:0, magnesium:0 };
let consumablesData = {};
let modalTargetList = null;
let selectedInModal = [];
let currentDate = new Date();
let selectionSortPreference = { field: 'name', direction: 'asc' };
const nameSorterEn = new Intl.Collator('en', { sensitivity: 'base' });
const nameSorterZh = new Intl.Collator('zh-Hant-TW', { sensitivity: 'base' });
let storageState = { version: 1, days: {} };
let googleTokenClient = null;
let googleAccessToken = null;


function updateGoogleUiState(isSignedIn, statusText) {
  const loginBtn = document.getElementById('googleLoginBtn');
  const logoutBtn = document.getElementById('googleLogoutBtn');
  const indicator = document.getElementById('googleIndicator');
  const status = document.getElementById('googleStatus');
  if (loginBtn) loginBtn.style.display = isSignedIn ? 'none' : 'inline-block';
  if (logoutBtn) logoutBtn.style.display = isSignedIn ? 'inline-block' : 'none';
  if (indicator) {
    indicator.innerText = isSignedIn ? '已連線' : '未連線';
    indicator.classList.toggle('connected', isSignedIn);
  }
  if (status && statusText) status.innerText = statusText;
}


function formatBackupTime(ts) {
  if (!ts) return '尚無紀錄';
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return '尚無紀錄';
  return d.toLocaleString('zh-TW', { hour12: false });
}

function refreshLastBackupStatus() {
  const el = document.getElementById('lastBackupStatus');
  if (!el) return;
  const ts = Number(localStorage.getItem(LAST_BACKUP_AT_KEY) || 0);
  el.innerText = `上次備份：${formatBackupTime(ts)}`;
}

function setLastBackupTime(ts = Date.now()) {
  localStorage.setItem(LAST_BACKUP_AT_KEY, String(ts));
  refreshLastBackupStatus();
}

async function maybeAutoBackup() {
  const last = Number(localStorage.getItem(LAST_BACKUP_AT_KEY) || 0);
  const due = !last || (Date.now() - last) > AUTO_BACKUP_INTERVAL_MS;
  if (!due) return;
  try {
    await backupToGoogleDrive({ silent: true, reason: 'auto-hourly-check' });
    console.log('[GoogleDrive] auto backup success');
  } catch (err) {
    console.log('[GoogleDrive] auto backup skipped/failed', err);
  }
}

fetch('consumables.json').then(res => res.json()).then(data => {
  consumablesData = data;
  initializeApp();
});

function initializeApp() {
  loadState();
  createMeals();
  initGoogleTokenClient();
  updateGoogleUiState(false, '尚未登入 Google');
  restoreStaySignedInPreference();
  refreshLastBackupStatus();
  maybeAutoBackup();
  setCurrentDate(currentDate);
}

function toggleManagement() {
  const box = document.getElementById('management');
  box.classList.toggle('expanded');
  const open = box.classList.contains('expanded');
  document.querySelector('.management-header').innerText = open ? '資料管理 ▲' : '資料管理 ▼';
}

function switchTab(tab, targetEl) {
  document.getElementById('daily').style.display = tab === 'daily' ? 'block' : 'none';
  document.getElementById('review').style.display = tab === 'review' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  targetEl.classList.add('active');
}

function toggleFloating() {
  const floating = document.getElementById("floating");
  floating.classList.toggle("expanded");
  document.getElementById('editorLinkBtn').classList.toggle('up', floating.classList.contains('expanded'));
}

function createMeals() {
  const container = document.getElementById('mealContainer');
  container.innerHTML = '';
  [
    { title: '早餐', key: 'breakfast' },
    { title: '午餐', key: 'lunch' },
    { title: '晚餐', key: 'dinner' }
  ].forEach(meal => container.appendChild(createSectionCard(meal.title, 'meal-card', meal.key)));

  const snackTitle = document.createElement('h3');
  snackTitle.innerText = '點心';
  container.appendChild(snackTitle);

  const snackWrap = document.createElement('div');
  snackWrap.id = 'snackWrap';
  container.appendChild(snackWrap);

  const snackBtn = document.createElement('button');
  snackBtn.className = 'add-snack-btn';
  snackBtn.innerText = '+ 新增點心';
  snackBtn.onclick = () => addSnackSection();
  container.appendChild(snackBtn);
}

function createSectionCard(title, className, sectionKey) {
  const card = document.createElement('div');
  card.className = className;

  const header = document.createElement('div');
  header.className = 'section-header';

  const titleEl = document.createElement('div');
  titleEl.className = 'section-title';
  titleEl.innerText = title;

  const btn = document.createElement('button');
  btn.className = 'select-btn';
  btn.innerText = '選擇可食項目';

  const list = document.createElement('div');
  list.className = 'items-list';
  list.dataset.sectionKey = sectionKey;
  btn.onclick = () => openSelectionModal(list);

  header.appendChild(titleEl);
  header.appendChild(btn);
  card.appendChild(header);
  card.appendChild(list);
  return card;
}

function addSnackSection(items = []) {
  const snackWrap = document.getElementById('snackWrap');
  const count = snackWrap.children.length + 1;
  const card = createSectionCard(`點心 ${count}`, 'snack-card', `snack-${count}`);
  snackWrap.appendChild(card);
  items.forEach(item => addItemRow(card.querySelector('.items-list'), item.item, item.qty));
  saveCurrentDayData();
  recalculateTotals();
}

function isEnglishLeading(text = '') {
  return /^[A-Za-z]/.test((text || '').trim());
}

function compareByName(a, b) {
  const aName = (a?.name || '').trim();
  const bName = (b?.name || '').trim();
  const aIsEn = isEnglishLeading(aName);
  const bIsEn = isEnglishLeading(bName);
  if (aIsEn && bIsEn) return nameSorterEn.compare(aName, bName);
  if (!aIsEn && !bIsEn) return nameSorterZh.compare(aName, bName);
  return aIsEn ? -1 : 1;
}

function compareConsumables(a, b) {
  const { field, direction } = selectionSortPreference;
  const factor = direction === 'desc' ? -1 : 1;
  if (field === 'name') return compareByName(a, b) * factor;
  return ((Number(a?.[field]) || 0) - (Number(b?.[field]) || 0)) * factor;
}

function renderSelectionModalBody() {
  const modalBody = document.getElementById('modalBody');
  modalBody.innerHTML = '';

  Object.keys(consumablesData).forEach(typeName => {
    const card = document.createElement('div');
    card.className = 'type-card';
    const header = document.createElement('div');
    header.className = 'type-header';
    const title = document.createElement('span');
    title.innerText = typeName;
    const plusBtn = document.createElement('button');
    plusBtn.className = 'type-plus';
    plusBtn.innerText = '+';
    const itemWrap = document.createElement('div');
    itemWrap.className = 'type-items';

    plusBtn.onclick = () => {
      const isOpen = itemWrap.classList.toggle('open');
      plusBtn.innerText = isOpen ? '-' : '+';
      if (itemWrap.dataset.loaded === '1') return;
      const sortedItems = [...(consumablesData[typeName] || [])].sort(compareConsumables);
      sortedItems.forEach(item => {
        const chip = document.createElement('button');
        const isSelected = selectedInModal.some(sel => sel.name === item.name);
        chip.className = `option-chip ${isSelected ? 'selected' : ''}`;
        chip.innerText = item.name;
        chip.onclick = () => {
          chip.classList.toggle('selected');
          const exists = selectedInModal.some(sel => sel.name === item.name);
          selectedInModal = exists ? selectedInModal.filter(sel => sel.name !== item.name) : selectedInModal.concat(item);
        };
        itemWrap.appendChild(chip);
      });
      itemWrap.dataset.loaded = '1';
    };

    header.appendChild(title);
    header.appendChild(plusBtn);
    card.appendChild(header);
    card.appendChild(itemWrap);
    modalBody.appendChild(card);
  });
}

function renderSortControls() {
  const fieldWrap = document.getElementById('sortFieldOptions');
  const directionWrap = document.getElementById('sortDirectionOptions');
  if (!fieldWrap || !directionWrap) return;

  fieldWrap.innerHTML = '';
  sortFieldOptions.forEach(field => {
    const btn = document.createElement('button');
    btn.className = `sort-option-btn ${selectionSortPreference.field === field ? 'active' : ''}`;
    btn.innerText = sortFieldLabels[field] || field;
    btn.onclick = () => {
      selectionSortPreference.field = field;
      renderSortControls();
    };
    fieldWrap.appendChild(btn);
  });

  directionWrap.innerHTML = '';
  [
    { value: 'asc', label: '升冪（小到大 / A→Z）' },
    { value: 'desc', label: '降冪（大到小 / Z→A）' }
  ].forEach(({ value, label }) => {
    const btn = document.createElement('button');
    btn.className = `sort-option-btn ${selectionSortPreference.direction === value ? 'active' : ''}`;
    btn.innerText = label;
    btn.onclick = () => {
      selectionSortPreference.direction = value;
      renderSortControls();
    };
    directionWrap.appendChild(btn);
  });
}

function openSortModal() {
  renderSortControls();
  document.getElementById('sortModal').classList.add('open');
}

function closeSortModal() {
  document.getElementById('sortModal').classList.remove('open');
}

function applySortPreference() {
  closeSortModal();
  renderSelectionModalBody();
}

function openSelectionModal(targetList) {
  modalTargetList = targetList;
  selectedInModal = [];
  renderSelectionModalBody();
  document.getElementById('selectionModal').classList.add('open');
}

function closeModal() {
  document.getElementById('selectionModal').classList.remove('open');
  closeSortModal();
  selectedInModal = [];
}

function confirmSelection() {
  if (!modalTargetList || selectedInModal.length === 0) return closeModal();
  selectedInModal.forEach(item => addItemRow(modalTargetList, item, 1));
  closeModal();
  recalculateTotals();
  saveCurrentDayData();
}

function addItemRow(list, item, qty = 1) {
  const row = document.createElement('div');
  row.className = 'consumable-row';

  const info = document.createElement('div');
  info.className = 'item-info';
  const name = document.createElement('div');
  name.innerText = item.name;
  const sub = document.createElement('div');
  sub.className = 'item-sub';
  sub.innerText = `熱量 ${item.calories || 0}kcal / 碳水 ${item.carbohydrates || 0}g`;
  info.appendChild(name); info.appendChild(sub);

  const qtyControl = document.createElement('div');
  qtyControl.className = 'qty-control';
  const minus = document.createElement('button'); minus.className = 'qty-btn'; minus.innerText = '-';
  const input = document.createElement('input');
  input.type = 'number'; input.min = '0'; input.step = '1'; input.value = String(qty); input.className = 'qty-input';
  const plus = document.createElement('button'); plus.className = 'qty-btn'; plus.innerText = '+';

  minus.onclick = () => {
    const next = Math.max(0, Number(input.value || 0) - 1);
    input.value = next;
    if (next === 0) row.remove();
    recalculateTotals();
    saveCurrentDayData();
  };
  plus.onclick = () => {
    input.value = Number(input.value || 0) + 1;
    recalculateTotals();
    saveCurrentDayData();
  };
  input.onchange = () => {
    if (Number(input.value || 0) < 0) input.value = 0;
    if (Number(input.value || 0) === 0) row.remove();
    recalculateTotals();
    saveCurrentDayData();
  };

  qtyControl.appendChild(minus); qtyControl.appendChild(input); qtyControl.appendChild(plus);
  row.appendChild(info); row.appendChild(qtyControl);
  nutrients.forEach(n => row.dataset[n] = item[n] || 0);
  row.dataset.item = JSON.stringify(item);
  list.appendChild(row);
}

function recalculateTotals() {
  totals = { calories:0, totalFat:0, carbohydrates:0, saturatedFat:0, addedSugar:0, sodium:0, protein:0, solubleFiber:0, insolubleFiber:0, potassium:0, magnesium:0 };
  document.querySelectorAll('.consumable-row').forEach(row => {
    const qty = Number(row.querySelector('.qty-input').value || 0);
    totals.calories += Number(row.dataset.calories) * qty;
    totals.totalFat += Number(row.dataset.totalFat) * qty;
    totals.carbohydrates += Number(row.dataset.carbohydrates) * qty;
    totals.saturatedFat += Number(row.dataset.saturatedFat) * qty;
    totals.addedSugar += Number(row.dataset.addedSugar) * qty;
    totals.sodium += Number(row.dataset.sodium) * qty;
    totals.protein += Number(row.dataset.protein) * qty;
    totals.solubleFiber += Number(row.dataset.solubleFiber) * qty;
    totals.insolubleFiber += Number(row.dataset.insolubleFiber) * qty;
    totals.potassium += Number(row.dataset.potassium) * qty;
    totals.magnesium += Number(row.dataset.magnesium) * qty;
  });
  updateDisplay();
}

function updateDisplay() {
  document.getElementById('satFat').innerText = totals.saturatedFat.toFixed(1);
  document.getElementById('sugar').innerText = totals.addedSugar.toFixed(1);
  document.getElementById('calories').innerText = `${totals.calories.toFixed(0)}/${suggestedMinimums.calories}`;
  document.getElementById('carbohydrates').innerText = `${totals.carbohydrates.toFixed(1)}/${suggestedMinimums.carbohydrates}`;
  document.getElementById('proteinAdequate').innerText = `${totals.protein.toFixed(1)}/${suggestedMinimums.protein}`;
  document.getElementById('sodiumAdequate').innerText = `${totals.sodium.toFixed(0)}/${suggestedMinimums.sodium}`;
  document.getElementById('totalFat').innerText = `${totals.totalFat.toFixed(1)}/${suggestedMinimums.totalFat}`;
  document.getElementById('solFiberAdequate').innerText = `${totals.solubleFiber.toFixed(1)}/${suggestedMinimums.solubleFiber}`;
  document.getElementById('insFiberAdequate').innerText = `${totals.insolubleFiber.toFixed(1)}/${suggestedMinimums.insolubleFiber}`;
  document.getElementById('potassiumAdequate').innerText = `${totals.potassium.toFixed(0)}/${suggestedMinimums.potassium}`;
  document.getElementById('magnesiumAdequate').innerText = `${totals.magnesium.toFixed(0)}/${suggestedMinimums.magnesium}`;
}

function dateKey(date) { return new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().slice(0,10); }
function setCurrentDate(date) {
  currentDate = new Date(date);
  document.getElementById('dateLabel').innerText = dateKey(currentDate);
  renderCurrentDay();
}
function shiftDate(diff) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + diff);
  setCurrentDate(d);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    storageState = raw ? JSON.parse(raw) : { version: 1, days: {} };
    if (!storageState.days) storageState.days = {};
  } catch (_) {
    storageState = { version: 1, days: {} };
  }
}

function persistState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(storageState));
}

function collectListData(listEl) {
  return Array.from(listEl.querySelectorAll('.consumable-row')).map(row => ({
    item: JSON.parse(row.dataset.item),
    qty: Number(row.querySelector('.qty-input').value || 0)
  })).filter(r => r.qty > 0);
}

function saveCurrentDayData() {
  const key = dateKey(currentDate);
  const lists = document.querySelectorAll('.items-list');
  const day = { breakfast: [], lunch: [], dinner: [], snacks: [] };
  lists.forEach(list => {
    const section = list.dataset.sectionKey;
    const data = collectListData(list);
    if (section === 'breakfast') day.breakfast = data;
    else if (section === 'lunch') day.lunch = data;
    else if (section === 'dinner') day.dinner = data;
    else if (section && section.startsWith('snack-')) day.snacks.push(data);
  });
  storageState.days[key] = day;
  persistState();
}

function renderCurrentDay() {
  createMeals();
  const key = dateKey(currentDate);
  const day = storageState.days[key] || { breakfast: [], lunch: [], dinner: [], snacks: [] };
  const map = {
    breakfast: document.querySelector('[data-section-key="breakfast"]'),
    lunch: document.querySelector('[data-section-key="lunch"]'),
    dinner: document.querySelector('[data-section-key="dinner"]')
  };
  day.breakfast.forEach(entry => addItemRow(map.breakfast, entry.item, entry.qty));
  day.lunch.forEach(entry => addItemRow(map.lunch, entry.item, entry.qty));
  day.dinner.forEach(entry => addItemRow(map.dinner, entry.item, entry.qty));
  (day.snacks || []).forEach(snackList => addSnackSection(snackList));
  recalculateTotals();
}

function exportJson() {
  const blob = new Blob([JSON.stringify(storageState, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diet-tracker-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || typeof parsed !== 'object' || !parsed.days) throw new Error('invalid');
      storageState = parsed;
      persistState();
      renderCurrentDay();
      alert('匯入成功');
    } catch (_) {
      alert('匯入失敗，請確認 JSON 格式');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function wipeAllData() {
  if (!confirm('確定要刪除所有天數資料嗎？')) return;
  storageState = { version: 1, days: {} };
  persistState();
  renderCurrentDay();
}

function initGoogleTokenClient() {
  if (!window.google || !google.accounts || !google.accounts.oauth2) return;
  googleTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: () => {},
    error_callback: (err) => {
      console.log('[GoogleAuth] token client error', err);
    }
  });
}

function cacheGoogleToken(token, expiresInSec) {
  const expiresAt = Date.now() + Number(expiresInSec || 0) * 1000;
  localStorage.setItem(GOOGLE_TOKEN_CACHE_KEY, JSON.stringify({ token, expiresAt }));
}

function restoreGoogleTokenFromCache() {
  if (localStorage.getItem(STAY_SIGNED_IN_KEY) !== '1') return false;
  try {
    const raw = localStorage.getItem(GOOGLE_TOKEN_CACHE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (!parsed.token || !parsed.expiresAt || parsed.expiresAt <= Date.now()) {
      localStorage.removeItem(GOOGLE_TOKEN_CACHE_KEY);
      return false;
    }
    googleAccessToken = parsed.token;
    updateGoogleUiState(true, '已登入（使用快取憑證）');
    console.log('[GoogleAuth] restore token cache success');
    return true;
  } catch (_) {
    localStorage.removeItem(GOOGLE_TOKEN_CACHE_KEY);
    return false;
  }
}

function requestGoogleToken(promptMode = '') {
  return new Promise((resolve, reject) => {
    if (!googleTokenClient) {
      initGoogleTokenClient();
      if (!googleTokenClient) return reject(new Error('Google SDK 尚未載入'));
    }
    googleTokenClient.callback = (resp) => {
      if (resp.error) return reject(new Error(resp.error));
      if (!resp.access_token) return reject(new Error('未取得 access token'));
      googleAccessToken = resp.access_token;
      cacheGoogleToken(resp.access_token, resp.expires_in);
      updateGoogleUiState(true, '已取得 Google 授權');
      console.log('[GoogleAuth] sign-in success');
      resolve(resp.access_token);
    };
    googleTokenClient.requestAccessToken({ prompt: promptMode });
  });
}

async function ensureGoogleAccessToken(interactive = true) {
  if (googleAccessToken) return googleAccessToken;
  if (restoreGoogleTokenFromCache()) return googleAccessToken;
  if (!interactive) {
    return await requestGoogleToken('none');
  }
  return await requestGoogleToken('');
}

async function handleGoogleLogin() {
  try {
    await ensureGoogleAccessToken(true);
    await maybeAutoBackup();
  }
  catch (err) { console.log('[GoogleAuth] sign-in failed', err); alert(`Google 登入失敗: ${err.message}`); }
}

function logoutGoogle() {
  if (googleAccessToken && window.google && google.accounts && google.accounts.oauth2) {
    google.accounts.oauth2.revoke(googleAccessToken, () => {});
  }
  googleAccessToken = null;
  localStorage.removeItem(GOOGLE_TOKEN_CACHE_KEY);
  updateGoogleUiState(false, '尚未登入 Google');
  console.log('[GoogleAuth] sign-out success');
}

function toggleStaySignedIn(checked) {
  localStorage.setItem(STAY_SIGNED_IN_KEY, checked ? '1' : '0');
  if (!checked) localStorage.removeItem(GOOGLE_TOKEN_CACHE_KEY);
}

function restoreStaySignedInPreference() {
  const stay = localStorage.getItem(STAY_SIGNED_IN_KEY) === '1';
  document.getElementById('staySignedIn').checked = stay;
  if (stay && restoreGoogleTokenFromCache()) return;
  if (stay) {
    updateGoogleUiState(false, '已啟用保持登入（操作時會嘗試靜默登入）');
  }
}

async function getAppDataFileId() {
  const params = new URLSearchParams({
    q: `name='${GDRIVE_FILE_NAME}' and trashed=false`,
    spaces: 'appDataFolder',
    fields: 'files(id,name)'
  });
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params.toString()}`, {
    headers: { Authorization: `Bearer ${googleAccessToken}` }
  });
  const data = await res.json();
  return data.files && data.files[0] ? data.files[0].id : null;
}

async function backupToGoogleDrive(options = {}) {
  const { silent = false, reason = 'manual' } = options;
  try {
    await ensureGoogleAccessToken(!silent);
    const fileId = await getAppDataFileId();
    const metadata = { name: GDRIVE_FILE_NAME, parents: ['appDataFolder'] };
    const boundary = 'foo_bar_baz';
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(storageState)}\r\n` +
      `--${boundary}--`;

    const method = fileId ? 'PATCH' : 'POST';
    const url = fileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';

    const res = await fetch(url, {
      method,
      headers: { Authorization: `Bearer ${googleAccessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
      body
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    setLastBackupTime(Date.now());
    console.log('[GoogleDrive] backup success', { reason });
    if (!silent) alert('已備份到 Google Drive appDataFolder');
    return true;
  } catch (err) {
    console.log('[GoogleDrive] backup failed', { reason, err });
    if (!silent) alert(`備份失敗: ${err.message}`);
    throw err;
  }
}


async function restoreFromGoogleDrive() {
  try {
    await ensureGoogleAccessToken(true);
    const fileId = await getAppDataFileId();
    if (!fileId) return alert('找不到雲端備份');
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${googleAccessToken}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.days) throw new Error('備份格式錯誤');
    storageState = data;
    persistState();
    renderCurrentDay();
    console.log('[GoogleDrive] load success');
    alert('已從 Google Drive 還原');
  } catch (err) {
    console.log('[GoogleDrive] load failed', err);
    alert(`還原失敗: ${err.message}`);
  }
}
